<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to SnipSnip</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #09090b;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body>
  <img src="/welcome/welcome-bg.png" alt="Welcome to SnipSnip">
  <script>
    navigator.sendBeacon('/api/view', new Blob(
      [JSON.stringify({ page: 'welcome', referrer: document.referrer || null })],
      { type: 'application/json' }
    ));

    // Check for pending save from share page (deep link flow)
    try {
      var pendingCode = localStorage.getItem('ss_pending_save');
      if (pendingCode) {
        document.documentElement.dataset.pendingSave = pendingCode;
        localStorage.removeItem('ss_pending_save');
      }
    } catch(e) {}
  </script>
</body>
</html>
