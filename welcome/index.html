<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to SnipSnip</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090b; color: #e4e4e7; min-height: 100vh;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .logo {
      font-size: 32px; font-weight: 700; letter-spacing: -1px;
      margin-bottom: 48px;
      animation: fade-in 0.5s ease-out both;
    }
    .logo span { color: #ff4d4d; }

    h1 {
      font-size: 52px; font-weight: 800; letter-spacing: -1.5px;
      line-height: 1.15; text-align: center;
      animation: fade-in 0.6s ease-out 0.15s both;
    }
    h1 em {
      font-style: normal; color: #ff4d4d;
      display: block;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .arrow-svg {
      position: fixed; inset: 0; width: 100%; height: 100%;
      z-index: 10; pointer-events: none;
      animation: fade-in 0.6s ease-out 0.4s both;
    }

    @media (max-width: 640px) {
      h1 { font-size: 36px; }
    }
  </style>
</head>
<body>

  <svg class="arrow-svg" viewBox="0 0 1440 900" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M820 520 C900 420, 1100 200, 1340 60 C1360 48, 1380 38, 1395 28" stroke="#ff4d4d" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M1385 18 L1398 26 L1402 40" stroke="#ff4d4d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </svg>

  <div class="logo">Snip<span>Snip</span></div>
  <h1>You're in.<em>Create your first Snip.</em></h1>

  <script>
    navigator.sendBeacon('/api/view', new Blob(
      [JSON.stringify({ page: 'welcome', referrer: document.referrer || null })],
      { type: 'application/json' }
    ));
  </script>
</body>
</html>
