<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to SnipSnip</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #09090b; color: #e4e4e7; min-height: 100vh;
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .logo {
      font-size: 32px; font-weight: 700; letter-spacing: -1px;
      margin-bottom: 48px;
      animation: fade-in 0.5s ease-out both;
    }
    .logo span { color: #ff4d4d; }

    h1 {
      font-size: 52px; font-weight: 800; letter-spacing: -1.5px;
      line-height: 1.15; text-align: center;
      animation: fade-in 0.6s ease-out 0.15s both;
    }
    h1 em {
      font-style: normal; color: #ff4d4d;
      display: block;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Arrow */
    .arrow {
      position: fixed; top: 12px; right: 68px;
      z-index: 10;
      animation: fade-in 0.5s ease-out 0.5s both;
    }
    .arrow svg {
      width: 64px; height: 140px;
      animation: bounce 1.8s ease-in-out infinite;
      filter: drop-shadow(0 2px 8px rgba(255,77,77,0.25));
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    .arrow-label {
      position: fixed; top: 156px; right: 18px;
      z-index: 10;
      background: #ff4d4d; color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 8px 16px; border-radius: 10px;
      box-shadow: 0 6px 20px rgba(255,77,77,0.3);
      white-space: nowrap;
      animation: fade-in 0.5s ease-out 0.7s both;
    }
    .arrow-label::before {
      content: '';
      position: absolute; top: -5px; right: 36px;
      width: 10px; height: 10px;
      background: #ff4d4d;
      transform: rotate(45deg);
    }

    @media (max-width: 640px) {
      h1 { font-size: 36px; }
      .arrow { right: 30px; }
      .arrow-label { right: 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <div class="arrow">
    <svg viewBox="0 0 64 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 140 C32 140, 34 70, 44 35 C48 22, 46 10, 40 4" stroke="#ff4d4d" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <path d="M35 1 L40 4 L42 11" stroke="#ff4d4d" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>
  </div>
  <div class="arrow-label">Click here to start</div>

  <div class="logo">Snip<span>Snip</span></div>
  <h1>You're in.<em>Create your first Snip.</em></h1>

  <script>
    navigator.sendBeacon('/api/view', new Blob(
      [JSON.stringify({ page: 'welcome', referrer: document.referrer || null })],
      { type: 'application/json' }
    ));
  </script>
</body>
</html>
